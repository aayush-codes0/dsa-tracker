<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DSA Tracker — ER Diagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; }
        h1 { text-align: center; padding: 20px 20px 4px; font-size: 1.4rem; }
        .sub { text-align: center; color: #666; font-size: 0.85rem; margin-bottom: 8px; }
        .legend {
            display: flex; justify-content: center; gap: 30px; padding: 6px 0 10px;
            font-size: 0.8rem; color: #333; flex-wrap: wrap;
        }
        .legend span { display: inline-flex; align-items: center; gap: 6px; }
        .lr { width: 24px; height: 14px; border: 2px solid #000; display: inline-block; }
        .lo { width: 28px; height: 14px; border: 2px solid #000; border-radius: 50%; display: inline-block; }
        .ld { width: 14px; height: 14px; border: 2px solid #000; transform: rotate(45deg); display: inline-block; }
        .wrap { display: flex; justify-content: center; overflow: auto; padding: 0 10px 40px; }
        svg text { font-family: 'Segoe UI', Arial, sans-serif; }
    </style>
</head>
<body>

<h1>DSA Tracker — Entity Relationship Diagram</h1>
<p class="sub">Chen Notation • 6 Entities • 6 Relationships</p>
<div class="legend">
    <span><i class="lr"></i> Entity</span>
    <span><i class="lo"></i> Attribute</span>
    <span><i class="ld"></i> Relationship</span>
    <span style="text-decoration:underline;font-weight:600;">attr</span> = Primary Key
    <span style="font-weight:600;">1, N</span> = Cardinality
</div>

<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2600" viewBox="0 0 1600 2600">
<style>
    .entity-rect { fill: #fff; stroke: #000; stroke-width: 2.5; }
    .attr-oval { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .diamond { fill: #fff; stroke: #000; stroke-width: 2; }
    .conn { stroke: #000; stroke-width: 1.5; fill: none; }
    .ename { font-size: 15px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
    .aname { font-size: 11px; text-anchor: middle; dominant-baseline: central; }
    .pk { font-size: 11px; text-anchor: middle; dominant-baseline: central; text-decoration: underline; }
    .dname { font-size: 11px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
    .card { font-size: 13px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
</style>
